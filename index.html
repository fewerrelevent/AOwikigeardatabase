<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arcane Odyssey Equipment Viewer</title>
<style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 20px;
    background: #f4f6f8;
    color: #222;
  }

  h1 {
    margin-bottom: 5px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    font-size: 14px;
  }

  thead {
    background: #1f2937;
    color: white;
    position: sticky;
    top: 0;
  }

  th, td {
    padding: 8px 10px;
    border: 1px solid #e5e7eb;
    vertical-align: top;
    text-align: left;
  }

  th {
    font-weight: 600;
  }

  tbody tr:nth-child(even) {
    background: #f9fafb;
  }

  tbody tr:hover {
    background: #eef2f7;
  }

  td img {
    max-width: 60px;
    max-height: 60px;
    display: block;
    margin: auto;
  }

  .no-info {
    color: #888;
    font-style: italic;
  }

  .multi-line {
    line-height: 1.4em;
  }
</style>
</head>
<body>

<h1>Arcane Odyssey Fandom Wiki Database</h1>
<p>Data does not yet automatically update.</p>
<div id="armorTable">Loading...</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const jsonURL = "equipment.json";
  const container = document.getElementById("armorTable");

  const NO_INFO = "<span class='no-info'>No Info Available</span>";

  function safeValue(value) {
    if (value === undefined || value === null || value === "" ||
        (typeof value === "object" && Object.keys(value).length === 0)) {
      return NO_INFO;
    }
    return value;
  }

  function formatStats(stats) {
    if (!stats || Object.keys(stats).length === 0) return NO_INFO;

    return Object.entries(stats)
      .map(([stat, values]) =>
        `${stat}: ${Object.entries(values)
          .map(([k,v]) => `${k} ${v}`)
          .join(", ")}`
      )
      .join("<br>");
  }

  function formatWorth(obj) {
    if (!obj || Object.keys(obj).length === 0) return NO_INFO;

    return Object.entries(obj)
      .map(([lvl,val]) => `Lv ${lvl}: ${val}`)
      .join("<br>");
  }

  function formatObject(obj) {
    if (!obj || Object.keys(obj).length === 0) return NO_INFO;

    return Object.values(obj).join("<br>");
  }

  fetch(jsonURL)
    .then(res => {
      if (!res.ok) throw new Error("HTTP error " + res.status);
      return res.json();
    })
    .then(data => {

      let html = "<table><thead><tr>";

      const headers = [
        "Key","Name","EquipType","MinLevel","MaxLevel",
        "Rarity","StatType","Stats","WorthValues",
        "ObtainedBy","Variations","Description","Image"
      ];

      headers.forEach(h => html += `<th>${h}</th>`);
      html += "</tr></thead><tbody>";

      for (let key in data) {
        const item = data[key];
        html += "<tr>";

        html += `<td>${key}</td>`;
        html += `<td>${safeValue(item.Name)}</td>`;
        html += `<td>${safeValue(item.EquipType)}</td>`;
        html += `<td>${safeValue(item.MinLevel)}</td>`;
        html += `<td>${safeValue(item.MaxLevel)}</td>`;
        html += `<td>${safeValue(item.Rarity)}</td>`;
        html += `<td>${safeValue(item.StatType)}</td>`;
        html += `<td class="multi-line">${formatStats(item.Stats)}</td>`;
        html += `<td class="multi-line">${formatWorth(item.WorthValues)}</td>`;
        html += `<td class="multi-line">${formatObject(item.ObtainedBy)}</td>`;
        html += `<td>${safeValue(item.Variations)}</td>`;
        html += `<td>${safeValue(item.Description)}</td>`;

        const img = item.Image
          ? `<img src="${item.Image}" alt="${item.Name}">`
          : NO_INFO;

        html += `<td>${img}</td>`;

        html += "</tr>";
      }

      html += "</tbody></table>";
      container.innerHTML = html;

    })
    .catch(err => {
      console.error(err);
      container.innerHTML =
        "<p style='color:red;'>Failed to load data.</p>";
    });

});
</script>
</body>
</html>
