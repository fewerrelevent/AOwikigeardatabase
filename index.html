<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arcane Odyssey Equipment Viewer</title>
<style>
  body { font-family: Arial; margin: 20px; background: #f8f8f8; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    background: white;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .card h2 {
    margin-top: 0;
  }

  .section {
    margin-bottom: 10px;
    padding: 8px;
    background: #f4f4f4;
    border-radius: 4px;
  }

  .label {
    font-weight: bold;
  }

  img {
    max-width: 80px;
    max-height: 80px;
    display: block;
    margin-bottom: 10px;
  }

  .missing {
    color: #888;
    font-style: italic;
  }
</style>
</head>
<body>

<h1>Arcane Odyssey Fandom Wiki Database</h1>
<p>Data does not yet automatically update.</p>
<div id="armorTable">Loading...</div>

<script>
const jsonURL = "equipment.json";

fetch(jsonURL)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("armorTable");
    let html = "<table><thead><tr>";

    const headers = [
      "Key",
      "Name",
      "EquipType",
      "MinLevel",
      "MaxLevel",
      "Rarity",
      "StatType",
      "Stats",
      "WorthValues",
      "ObtainedBy",
      "Variations",
      "Description",
      "Image"
    ];

    headers.forEach(h => html += `<th>${h}</th>`);
    html += "</tr></thead><tbody>";

    function formatStats(stats) {
      if (!stats) return "<span class='missing'>None</span>";
      return Object.entries(stats)
        .map(([stat, values]) => {
          return `${stat}: ${Object.entries(values)
            .map(([k,v]) => `${k} ${v}`)
            .join(", ")}`;
        })
        .join("<br>");
    }

    function formatObject(obj) {
      if (!obj) return "<span class='missing'>None</span>";
      return Object.values(obj).join("<br>");
    }

    function formatWorth(obj) {
      if (!obj) return "<span class='missing'>None</span>";
      return Object.entries(obj)
        .map(([lvl,val]) => `Lv ${lvl}: ${val}`)
        .join("<br>");
    }

    for (let key in data) {
      const item = data[key];
      html += "<tr>";

      html += `<td>${key}</td>`;
      html += `<td>${item.Name || ""}</td>`;
      html += `<td>${item.EquipType || ""}</td>`;
      html += `<td>${item.MinLevel ?? ""}</td>`;
      html += `<td>${item.MaxLevel ?? ""}</td>`;
      html += `<td>${item.Rarity || ""}</td>`;
      html += `<td>${item.StatType || ""}</td>`;
      html += `<td>${formatStats(item.Stats)}</td>`;
      html += `<td>${formatWorth(item.WorthValues)}</td>`;
      html += `<td>${formatObject(item.ObtainedBy)}</td>`;
      html += `<td>${item.Variations ?? ""}</td>`;
      html += `<td>${item.Description || ""}</td>`;

      const img = item.Image
        ? `<img src="${item.Image}" alt="${item.Name}">`
        : "<span class='missing'>None</span>";

      html += `<td>${img}</td>`;

      html += "</tr>";
    }

    html += "</tbody></table>";
    container.innerHTML = html;
  })
  .catch(err => {
    console.error(err);
    document.getElementById("armorTable").innerHTML =
      "<p style='color:red;'>Failed to load data.</p>";
  });
</script>

</body>
</html>
