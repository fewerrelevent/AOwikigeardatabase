<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arcane Odyssey Equipment Viewer</title>
<style>
  body { font-family: Arial; margin: 20px; background: #f8f8f8; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    background: white;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .card h2 {
    margin-top: 0;
  }

  .section {
    margin-bottom: 10px;
    padding: 8px;
    background: #f4f4f4;
    border-radius: 4px;
  }

  .label {
    font-weight: bold;
  }

  img {
    max-width: 80px;
    max-height: 80px;
    display: block;
    margin-bottom: 10px;
  }

  .missing {
    color: #888;
    font-style: italic;
  }
</style>
</head>
<body>

<h1>Arcane Odyssey Fandom Wiki Database</h1>
<p>Data does not yet automatically update.</p>
<div id="armorGrid" class="grid">Loading...</div>

<script>
const jsonURL = "equipment.json";

fetch(jsonURL)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("armorGrid");
    container.innerHTML = "";

    function renderObject(obj) {
      let html = "";
      for (let key in obj) {
        let value = obj[key];

        if (typeof value === "object" && value !== null) {
          html += `<div class="section">
                    <div class="label">${key}</div>
                    ${renderObject(value)}
                   </div>`;
        } else {
          html += `<div><span class="label">${key}:</span> ${value}</div>`;
        }
      }
      return html;
    }

    for (let itemKey in data) {
      const item = data[itemKey];

      let card = document.createElement("div");
      card.className = "card";

      let imageHTML = item.Image 
        ? `<img src="${item.Image}" alt="${item.Name}">`
        : `<div class="missing">No image</div>`;

      card.innerHTML = `
        <h2>${item.Name || itemKey}</h2>
        ${imageHTML}
        ${renderObject(item)}
      `;

      container.appendChild(card);
    }
  })
  .catch(err => {
    console.error(err);
    document.getElementById("armorGrid").innerHTML =
      "<p style='color:red;'>Failed to load data.</p>";
  });
</script>

</body>
</html>
